name: demoecom

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

services:
  # ── MongoDB ────────────────────────────────────────────
  mongodb:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status().ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  mongo-init:
    image: mongo:7
    entrypoint: ["/scripts/init-mongo.sh"]
    volumes:
      - ./docker/scripts:/scripts
    depends_on:
      mongodb:
        condition: service_started
    restart: "no"
    networks:
      - backend

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # ── MinIO ──────────────────────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend

  minio-init:
    image: minio/mc
    entrypoint: ["/scripts/init-minio.sh"]
    volumes:
      - ./docker/scripts:/scripts
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKETS: products,avatars
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  # ── API Gateway ────────────────────────────────────────
  api:
    build:
      context: ./
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ecommerce
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - backend
      - frontend

  # ── Web Storefront ─────────────────────────────────────
  web:
    build:
      context: ./
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_started
    networks:
      - frontend
      - backend

  # ── Background Worker ──────────────────────────────────
  worker:
    build:
      context: ./
      dockerfile: docker/Dockerfile.worker
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/ecommerce
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - backend

  # ── Admin Dashboard ────────────────────────────────────
  admin:
    build:
      context: ./
      dockerfile: docker/Dockerfile.admin
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_started
    networks:
      - frontend
      - backend

  # ── Prometheus ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      backend:
        aliases:
          - prometheus
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ''
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started

  # ── MongoDB Exporter ───────────────────────────────────
  mongodb_exporter:
    image: percona/mongodb_exporter:0.40
    ports:
      - "9216:9216"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
    networks:
      - backend
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis Exporter ─────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
