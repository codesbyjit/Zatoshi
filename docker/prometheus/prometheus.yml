global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load alert rules
rule_files:
  - alerts.yml

scrape_configs:
  # App services run on the host machine (not in Docker containers)
  - job_name: 'api'
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          service: 'api'

  - job_name: 'worker'
    static_configs:
      - targets: ['host.docker.internal:3002']
        labels:
          service: 'worker'

  - job_name: 'web'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']
        labels:
          service: 'web'

  - job_name: 'admin'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['host.docker.internal:3003']
        labels:
          service: 'admin'

  # DB exporters run in Docker containers — use container names (Docker DNS)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['demoecom-mongodb_exporter-1:9216']

  - job_name: 'redis'
    static_configs:
      - targets: ['demoecom-redis_exporter-1:9121']
